<div style="background-color: #1e293b; border-radius: 16px; padding: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: space-between; border: 1px solid #334155; transition: transform 0.2s;">
  <div>
    <div style="font-size: 3.5rem; margin-bottom: 15px; text-align: center;">{%IMAGE%}</div>
    <h3 style="margin: 0 0 10px 0; font-size: 1.4rem; color: #f1f5f9; text-align: center;">{%TITLE%}</h3>
    <p style="color: #94a3b8; font-size: 0.9rem; margin: 5px 0; text-align: center;"><strong>Genre:</strong> {%GENRE%}</p>
    <p style="color: #fbbf24; font-size: 1.1rem; margin: 15px 0; text-align: center; font-weight: bold;">⭐ {%RATING%} / 10</p>
  </div>
  <a href="/movie?id={%ID%}" style="display: block; text-align: center; background-color: #0284c7; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 15px; transition: background 0.2s;">Details</a>
</div>
