<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{%TITLE%} - Movie Details</title>
  <style>
    body {
      background-color: #0f172a;
      color: #f8fafc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 25px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.2s;
    }
    .back-btn:hover {
      color: #7dd3fc;
    }
    .movie-box {
      background-color: #1e293b;
      max-width: 750px;
      margin: 60px auto;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0,0,0,0.4);
      border: 1px solid #334155;
    }
    .info-group {
      margin-top: 25px;
      border-top: 1px solid #334155;
      padding-top: 25px;
    }
    .info-item {
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #cbd5e1;
    }
    .info-item strong {
      color: #38bdf8;
    }
  </style>
</head>
<body>
  <div class="movie-box">
    <a href="/" class="back-btn">← Back to Directory</a>
    <div style="font-size: 4.5rem; text-align: center; margin-bottom: 15px;">{%IMAGE%}</div>
    <h1 style="color: #ffffff; margin: 0 0 10px 0; text-align: center; font-size: 2.5rem;">{%TITLE%}</h1>
    <p style="text-align: center; color: #94a3b8; font-style: italic; font-size: 1.1rem;">Directed by {%DIRECTOR%} ({%YEAR%})</p>
    
    <div class="info-group">
      <div class="info-item"><strong>Genre:</strong> {%GENRE%}</div>
      <div class="info-item"><strong>Rating:</strong> ⭐ {%RATING%} / 10</div>
      <div class="info-item" style="margin-top: 20px;">
        <strong>Plot Summary:</strong>
        <p style="line-height: 1.7; color: #cbd5e1; font-size: 1.05rem; margin-top: 8px;">{%DESCRIPTION%}</p>
      </div>
    </div>
  </div>
</body>
</html>
